name: "Release (anylinux amd64 + manylinux2014 amd64 + macOS arm64)"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    name: Build anylinux amd64 tarball (musl)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Build in Alpine container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            --platform linux/amd64 \
            alpine:3.20 sh -c '
              set -ex
              apk add --no-cache \
                build-base cmake git \
                libdwarf-dev elfutils-dev zlib-dev patchelf
              git config --global --add safe.directory /src
              git submodule foreach --recursive git config --global --add safe.directory \$toplevel/\$sm_path
              cmake -DCMAKE_BUILD_TYPE=Release -S . -B build
              cmake --build build -j$(nproc)
              mkdir -p /tmp/install/usr/local/bin /tmp/install/usr/local/lib
              cp build/vcd2fst /tmp/install/usr/local/bin/

              # Bundle shared library dependencies and set RPATHs
              STAGE=/tmp/install/usr/local
              for f in "$STAGE"/bin/*; do
                [ -f "$f" ] || continue
                ldd "$f" 2>/dev/null | awk "/=>/ {print \$3}" | while read -r lib; do
                  [ -f "$lib" ] || continue
                  base=$(basename "$lib")
                  case "$base" in ld-musl-*|libc.musl-*) continue ;; esac
                  [ -f "$STAGE/lib/$base" ] || cp "$lib" "$STAGE/lib/$base"
                done
                patchelf --set-rpath "\$ORIGIN/../lib" "$f"
              done
              for f in "$STAGE"/lib/*.so*; do
                [ -f "$f" ] && patchelf --set-rpath "\$ORIGIN" "$f" 2>/dev/null || true
              done

              cd /tmp/install
              tar czf /src/vcd2fst-anylinux-amd64.tar.gz .
            '

      - uses: actions/upload-artifact@v4
        with:
          name: vcd2fst-anylinux-amd64
          path: vcd2fst-anylinux-amd64.tar.gz

  build-manylinux:
    runs-on: ubuntu-latest
    name: Build manylinux2014 amd64 tarball (glibc 2.17+)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Build in CentOS 7 container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            --platform linux/amd64 \
            centos:7 bash -c '
              set -ex

              sed -i s/mirror.centos.org/vault.centos.org/g /etc/yum.repos.d/*.repo
              sed -i s/^#.*baseurl=http/baseurl=http/g /etc/yum.repos.d/*.repo
              sed -i s/^mirrorlist=http/#mirrorlist=http/g /etc/yum.repos.d/*.repo

              yum install -y centos-release-scl epel-release
              sed -i s/mirror.centos.org/vault.centos.org/g /etc/yum.repos.d/*.repo
              sed -i s/^#.*baseurl=http/baseurl=http/g /etc/yum.repos.d/*.repo
              sed -i s/^mirrorlist=http/#mirrorlist=http/g /etc/yum.repos.d/*.repo

              yum install -y devtoolset-11-gcc-c++ make git curl \
                zlib-devel patchelf \
                elfutils-devel elfutils-libelf-devel libdwarf-devel

              curl -L https://github.com/Kitware/CMake/releases/download/v3.28.3/cmake-3.28.3-linux-x86_64.tar.gz | tar -xzC /opt
              export PATH=/opt/cmake-3.28.3-linux-x86_64/bin:$PATH

              source /opt/rh/devtoolset-11/enable
              git config --global --add safe.directory /src
              git submodule foreach --recursive git config --global --add safe.directory \$toplevel/\$sm_path

              cmake -DCMAKE_BUILD_TYPE=Release -S . -B build
              cmake --build build -j$(nproc)
              mkdir -p /tmp/install/usr/local/bin /tmp/install/usr/local/lib
              cp build/vcd2fst /tmp/install/usr/local/bin/

              STAGE=/tmp/install/usr/local
              for f in "$STAGE"/bin/*; do
                [ -f "$f" ] || continue
                ldd "$f" 2>/dev/null | awk "/=>/ {print \$3}" | while read -r lib; do
                  [ -f "$lib" ] || continue
                  base=$(basename "$lib")
                  case "$base" in ld-linux*|libc.so*|libdl*|libpthread*|librt*|libm.so*) continue ;; esac
                  [ -f "$STAGE/lib/$base" ] || cp "$lib" "$STAGE/lib/$base"
                done
                patchelf --set-rpath "\$ORIGIN/../lib" "$f"
              done
              for f in "$STAGE"/lib/*.so*; do
                [ -f "$f" ] && patchelf --set-rpath "\$ORIGIN" "$f" 2>/dev/null || true
              done

              cd /tmp/install
              tar czf /src/vcd2fst-manylinux2014-amd64.tar.gz .
            '

      - uses: actions/upload-artifact@v4
        with:
          name: vcd2fst-manylinux2014-amd64
          path: vcd2fst-manylinux2014-amd64.tar.gz

  build-macos:
    runs-on: macos-15
    name: Build macOS arm64 tarball

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Install dependencies
        run: brew install cmake

      - name: Build
        run: |
          cmake -DCMAKE_BUILD_TYPE=Release -S . -B build
          cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Package tarball
        run: |
          mkdir -p /tmp/install/usr/local/bin /tmp/install/usr/local/lib
          cp build/vcd2fst /tmp/install/usr/local/bin/

          # Bundle non-system dylibs and rewrite load paths
          STAGE=/tmp/install/usr/local
          for f in "$STAGE"/bin/*; do
            [ -f "$f" ] || continue
            otool -L "$f" | awk 'NR>1 {print $1}' | while read -r lib; do
              case "$lib" in /usr/lib/*|/System/*|@*) continue ;; esac
              base=$(basename "$lib")
              [ -f "$STAGE/lib/$base" ] || cp "$lib" "$STAGE/lib/$base"
              install_name_tool -change "$lib" "@executable_path/../lib/$base" "$f"
            done
          done
          for f in "$STAGE"/lib/*.dylib; do
            [ -f "$f" ] || continue
            install_name_tool -id "@loader_path/$(basename "$f")" "$f"
            otool -L "$f" | awk 'NR>1 {print $1}' | while read -r dep; do
              case "$dep" in /usr/lib/*|/System/*|@*) continue ;; esac
              base=$(basename "$dep")
              [ -f "$STAGE/lib/$base" ] || cp "$dep" "$STAGE/lib/$base"
              install_name_tool -change "$dep" "@loader_path/$base" "$f"
            done
          done

          cd /tmp/install
          tar czf "$GITHUB_WORKSPACE/vcd2fst-macos-arm64.tar.gz" .

      - uses: actions/upload-artifact@v4
        with:
          name: vcd2fst-macos-arm64
          path: vcd2fst-macos-arm64.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-manylinux, build-macos]
    name: Create GitHub releases

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate release notes
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          FULL_SHA=$(git rev-parse HEAD)
          DATE=$(date -u +%Y-%m-%d)
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          printf '%s\n' \
            "Automated build from \`main\` @ [\`${SHORT_SHA}\`](${REPO_URL}/commit/${FULL_SHA})" \
            "" \
            "**Built:** ${DATE}" \
            "" \
            "### Platforms" \
            "" \
            "| Platform | File | Installation |" \
            "|----------|------|--------------|" \
            "| Linux amd64 (musl, portable) | \`vcd2fst-anylinux-amd64.tar.gz\` | \`sudo tar xzf vcd2fst-anylinux-amd64.tar.gz -C /\` |" \
            "| Linux amd64 (manylinux2014, glibc 2.17+) | \`vcd2fst-manylinux2014-amd64.tar.gz\` | \`sudo tar xzf vcd2fst-manylinux2014-amd64.tar.gz -C /\` |" \
            "| macOS arm64 | \`vcd2fst-macos-arm64.tar.gz\` | \`sudo tar xzf vcd2fst-macos-arm64.tar.gz -C /\` |" \
            > release_notes.md

      - name: Create permanent release
        run: |
          TAG="build-${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.short_sha }}"
          gh release create "$TAG" \
            vcd2fst-anylinux-amd64.tar.gz \
            vcd2fst-manylinux2014-amd64.tar.gz \
            vcd2fst-macos-arm64.tar.gz \
            --target "${{ github.sha }}" \
            --title "Build ${{ steps.meta.outputs.date }} (${{ steps.meta.outputs.short_sha }})" \
            --notes-file release_notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest release
        run: |
          git tag -f latest HEAD
          git push -f origin latest
          gh release delete latest --yes 2>/dev/null || true
          gh release create latest \
            vcd2fst-anylinux-amd64.tar.gz \
            vcd2fst-manylinux2014-amd64.tar.gz \
            vcd2fst-macos-arm64.tar.gz \
            --target "${{ github.sha }}" \
            --title "Latest Build (${{ steps.meta.outputs.date }})" \
            --notes-file release_notes.md \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
